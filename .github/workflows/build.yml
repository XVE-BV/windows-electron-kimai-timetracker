name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "chore: release v%s"
          git push --follow-tags

      - name: Resolve version
        id: resolve
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG=$(git describe --tags --abbrev=0)
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            extension: exe
          - os: macos-latest
            platform: macOS
            extension: dmg
          - os: ubuntu-latest
            platform: Linux
            extension: deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Make
        run: pnpm run make

      - name: Rename artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          # Copy installer
          Get-ChildItem -Path out/make -Recurse -Filter "*.exe" | ForEach-Object {
            $newName = "KimaiTimeTracker-$version-Windows-Setup.exe"
            Copy-Item $_.FullName -Destination "out/make/$newName"
          }
          # Copy nupkg and RELEASES for auto-updater
          Get-ChildItem -Path out/make -Recurse -Filter "*.nupkg" | ForEach-Object {
            Copy-Item $_.FullName -Destination "out/make/$($_.Name)"
          }
          Get-ChildItem -Path out/make -Recurse -Filter "RELEASES" | ForEach-Object {
            Copy-Item $_.FullName -Destination "out/make/RELEASES"
          }

      - name: Rename artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          version="${{ needs.prepare.outputs.version }}"
          find out/make -name "*.dmg" -exec cp {} "out/make/KimaiTimeTracker-$version-macOS.dmg" \;
          find out/make -name "*.zip" -exec cp {} "out/make/KimaiTimeTracker-$version-macOS.zip" \;

      - name: Rename artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          version="${{ needs.prepare.outputs.version }}"
          find out/make -name "*.deb" -exec cp {} "out/make/KimaiTimeTracker-$version-Linux-amd64.deb" \;
          find out/make -name "*.rpm" -exec cp {} "out/make/KimaiTimeTracker-$version-Linux-x86_64.rpm" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            out/make/KimaiTimeTracker-*
            out/make/*.nupkg
            out/make/RELEASES
          if-no-files-found: ignore

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
